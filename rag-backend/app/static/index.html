<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MattMercer — RAG Chat Platform</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/sidebar.css">
    <link rel="stylesheet" href="/static/css/chat-area.css">
    <link rel="stylesheet" href="/static/css/markdown.css">
    <link rel="stylesheet" href="/static/css/settings.css">
    <link rel="stylesheet" href="/static/css/models.css">
    <link rel="stylesheet" href="/static/css/db-management.css">
    <link rel="stylesheet" href="/static/css/pipeline-cards.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>MattMercer</h2>
                <button id="settings-btn" class="btn btn-secondary btn-full btn-sidebar-secondary">Настройки платформы</button>
                <button id="db-mgmt-btn" class="btn btn-secondary btn-full btn-sidebar-secondary">🔍 Поиск по хранилищу</button>
                <div class="domain-selector">
                    <label for="domain-select">Домен:</label>
                    <select id="domain-select" class="domain-select"></select>
                </div>
                <div class="campaign-selector" id="campaign-selector" style="display: none;">
                    <label for="campaign-select">Кампания:</label>
                    <select id="campaign-select" class="domain-select">
                        <option value="">— без кампании —</option>
                    </select>
                </div>
                <button id="new-chat-btn" class="btn btn-primary btn-full">+ Новая беседа</button>
            </div>
            <div class="chat-list" id="chat-list"></div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-header" id="chat-header">
                <h3 id="chat-title">Выберите чат или создайте новый</h3>
            </div>
            <div class="chat-context-bar hidden" id="chat-context-bar">
                <span class="context-campaign" id="context-campaign"><span id="campaign-name"></span></span>
                <span class="context-pipeline">
                    Pipeline:
                    <select id="pipeline-select"><option value="">Авто</option></select>
                    <button id="lock-pipeline-btn" class="btn btn-secondary btn-sm" title="Зафиксировать pipeline">🔓</button>
                </span>
                <!-- Баннер pending-files — справа в контекст-баре (step-07) -->
                <div id="chat-banner-area" class="context-banner-slot"></div>
            </div>
            <div class="messages-container" id="messages-container">
                <div class="welcome-message" id="welcome-message">
                    <h3>Добро пожаловать в MattMercer</h3>
                    <p>Создайте новый чат или выберите существующий из списка слева</p>
                </div>
            </div>
            <div id="status-banner" class="status-banner hidden"></div>
            <div class="input-area" id="input-area" style="display: none;">
                <textarea id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button id="send-btn" class="btn btn-send">Отправить</button>
            </div>
        </main>
    </div>

    <!-- Страница настроек (скрыта по умолчанию) -->
    <main id="settings-page" class="settings-page hidden">
        <div class="settings-header">
            <h2>Настройки платформы</h2>
            <button id="back-to-chat-btn" class="btn btn-secondary">← Назад к чатам</button>
        </div>
        <nav class="settings-tabs">
            <button data-tab="domains" class="active">Домены</button>
            <button data-tab="vaults">Vault'ы</button>
            <button data-tab="gen-models">Генеративные модели</button>
            <button data-tab="emb-models">Embedding-модели</button>
            <button data-tab="rerank-models">Reranker</button>
            <button data-tab="params">Параметры</button>
            <button data-tab="pipelines">Pipelines</button>
            <button data-tab="campaigns">Campaigns</button>
            <button data-tab="documents">Documents</button>
        </nav>
        <div id="settings-content" class="settings-content"></div>
    </main>

    <!-- Модальное окно переименования -->
    <div class="modal" id="rename-modal" style="display: none;">
        <div class="modal-content">
            <h3>Переименовать чат</h3>
            <div class="form-group">
                <label for="rename-input">Новое название:</label>
                <input type="text" id="rename-input" maxlength="255">
            </div>
            <div class="modal-actions">
                <button id="rename-confirm-btn" class="btn btn-primary">Сохранить</button>
                <button id="rename-cancel-btn" class="btn btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно поиска по хранилищу -->
    <div class="modal modal-lg" id="db-mgmt-modal" style="display: none;">
        <div class="modal-content modal-content-lg">
            <div class="modal-header">
                <h3>Поиск по хранилищу</h3>
                <button id="db-mgmt-close-btn" class="btn-close" title="Закрыть">✕</button>
            </div>
            <div class="search-form2">
                <select id="search-domain-select" class="search-domain-sel"></select>
                <input type="text" id="search-query-input" placeholder="Введите текст..." class="search-query-inp">
                <input type="number" id="search-limit" value="20" min="1" max="200" class="search-limit-inp">
                <button id="search-btn" class="btn btn-primary">Найти</button>
            </div>
            <div id="search-results" class="search-results">
                <div class="empty-state">Результаты поиска появятся здесь</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно деталей чанка -->
    <div class="modal" id="chunk-detail-modal" style="display: none;">
        <div class="modal-content chunk-detail-modal-content">
            <div class="modal-header">
                <span></span>
                <button id="chunk-detail-close" class="btn-close" title="Закрыть">✕</button>
            </div>
            <div id="chunk-detail-content" class="chunk-detail-body"></div>
        </div>
    </div>

    <!-- Markdown & security libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/pipeline_builder.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/settings/tab-domains.js"></script>
    <script src="/static/js/settings/tab-vaults.js"></script>
    <script src="/static/js/settings/tab-gen-models.js"></script>
    <script src="/static/js/settings/tab-emb-models.js"></script>
    <script src="/static/js/settings/tab-rerank-models.js"></script>
    <script src="/static/js/settings/tab-params.js"></script>
    <script src="/static/js/settings/tab-pipelines.js"></script>
    <!-- tag-badge.js должен быть загружен ДО tab-campaigns и tab-documents -->
    <script src="/static/js/settings/tag-badge.js"></script>
    <script src="/static/js/settings/tab-campaigns.js"></script>
    <script src="/static/js/settings/tab-documents.js"></script>
    <script src="/static/js/pending-banner.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/db_management.js"></script>
</body>
</html>
