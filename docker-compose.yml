services:
  rag-db:
    image: postgres:16
    env_file:
      - .env 
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-ragplatform}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: &default-logging
      driver: local
      options:
        max-size: 50m
        max-file: "5"

  db-api-server:
    build:
      context: .
      dockerfile: db-api-server/Dockerfile
    env_file:
      - .env 
    environment:
      SERVICE_PORT: "8080"
    volumes:
      - ./config/storage.config.yaml:/app/config.yaml:ro
      - ./data/lancedb:/data/lancedb
      - ./logs:/app/logs
    depends_on:
      rag-db:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  rag-indexer:
    build:
      context: .
      dockerfile: rag-indexer/Dockerfile
    env_file:
      - .env 
    environment:
      SERVICE_PORT: "9000"
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://raguser:changeme@rag-db:5432/ragplatform}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_API_URL: ${STORAGE_API_URL:-http://db-api-server:8080}
    # ports не пробрасываем наружу — rag-indexer внутренний сервис,
    # доступен только через rag-backend (proxy) внутри rag-net
    volumes:
      - ./vaults:/data/vaults:rw
      - ./state:/app/state
      - ./cache/embeddings:/app/cache/embeddings
      - ./logs:/app/logs
    depends_on:
      db-api-server:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  rag-backend:
    build:
      context: .
      dockerfile: rag-backend/Dockerfile
    env_file:
      - .env 
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://raguser:changeme@rag-db:5432/ragplatform}
      DB_API_URL: ${DB_API_URL:-http://db-api-server:8080}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_API_URL: ${STORAGE_API_URL:-http://db-api-server:8080}
      INDEXER_API_URL: ${INDEXER_API_URL:-http://rag-indexer:9000}
      SERVICE_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./rag-backend/app/static:/app/app/static:ro
      - ./vaults:/data/vaults:rw
    depends_on:
      rag-db:
        condition: service_healthy
      db-api-server:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

networks:
  rag-net:
    driver: bridge
