services:
  rag-db:
    image: postgres:16
    profiles: ["with-db-api", "core"]
    env_file:
      - .env 
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-ragplatform}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 3
    logging: &default-logging
      driver: local
      options:
        max-size: 50m
        max-file: "5"

  db-api-server:
    build:
      context: .
      dockerfile: db-api-server/Dockerfile
    profiles: ["with-db-api", "db-api-only"]
    env_file:
      - .env 
    environment:
      SERVICE_PORT: "8080"
    volumes:
      - ./config/storage.config.yaml:/app/config.yaml:ro
      - ./data/lancedb:/data/lancedb
      - ./logs:/app/logs
    depends_on:
      rag-db:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  redis:
    image: redis:7-alpine
    profiles: ["with-db-api", "core"]
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  rag-indexer:
    build:
      context: .
      dockerfile: rag-indexer/Dockerfile
    profiles: ["with-db-api", "core"]
    env_file:
      - .env 
    environment:
      SERVICE_PORT: "9000"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-changeme}@rag-db:5432/${POSTGRES_DB:-ragplatform}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_API_URL: ${STORAGE_API_URL:-http://db-api-server:8080}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    # ports не пробрасываем наружу — rag-indexer внутренний сервис,
    # доступен только через rag-backend (proxy) внутри rag-net
    volumes:
      - ${VAULTS_PATH}:/data/vaults:rw
      - ./logs:/app/logs
    depends_on:
      db-api-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  rag-backend:
    build:
      context: .
      dockerfile: rag-backend/Dockerfile
    profiles: ["with-db-api", "core"]
    env_file:
      - .env 
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-changeme}@rag-db:5432/${POSTGRES_DB:-ragplatform}
      DB_API_URL: ${DB_API_URL:-http://db-api-server:8080}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_API_URL: ${STORAGE_API_URL:-http://db-api-server:8080}
      INDEXER_API_URL: ${INDEXER_API_URL:-http://rag-indexer:9000}
      SERVICE_PORT: "8000"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      HOST_AGENT_URL: ${HOST_AGENT_URL:-http://host.docker.internal:9090}
      HOST_AGENT_TOKEN: ${HOST_AGENT_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./rag-backend/app/static:/app/app/static:ro
      - ${VAULTS_PATH}:/data/vaults:rw
    depends_on:
      rag-db:
        condition: service_healthy
      db-api-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-net
    # Linux: extra_hosts добавляет запись host.docker.internal -> host-gateway
    # macOS/Windows Docker Desktop: работает автоматически, запись безвредна
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

networks:
  rag-net:
    driver: bridge

volumes:
  redis_data:
